name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Verify tag matches package version
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - name: Build release assets
        run: |
          mkdir -p release
          npm pack --pack-destination release
          node bin/repotrailer.js . \
            --out release/launch-kit \
            --no-video
          tar -czf release/repotrailer-launch-kit.tar.gz \
            -C release launch-kit
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "RepoTrailer $GITHUB_REF_NAME" \
            --generate-notes \
            release/repotrailer-*.tgz \
            release/repotrailer-launch-kit.tar.gz
